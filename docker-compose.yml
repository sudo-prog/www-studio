version: '3.8'
services:
  frontend:
    build:
      context: ./artifacts/www-studio
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:3001
      - BASE_PATH=/
    depends_on:
      - backend
  backend:
    build:
      context: ./artifacts/api-server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://onecli:***@172.17.0.1:5432/www_studio
      - PORT=3001
    depends_on:
      - db
      - redis
  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=onecli
      - POSTGRES_PASSWORD=onecli
      - POSTGRES_DB=www_studio
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  pgdata:
