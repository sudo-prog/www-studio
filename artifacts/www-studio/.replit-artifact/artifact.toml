kind = "web"
previewPath = "/"
title = "WWW Studio"
version = "1.0.0"
id = "artifacts/www-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19332

[services.development]
run = "pnpm --filter @workspace/www-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/www-studio", "run", "build" ]
publicDir = "artifacts/www-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19332"
BASE_PATH = "/"
