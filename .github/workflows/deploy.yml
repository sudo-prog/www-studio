name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build www-studio frontend
        run: pnpm --filter @workspace/www-studio run build
        env:
          NODE_ENV: "production"

      - name: Deploy to Vercel (production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: '--prod'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-github-token: ${{ secrets.VERCEL_GITHUB_TOKEN }}

  preview-deploy:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build www-studio frontend
        run: pnpm --filter @workspace/www-studio run build
        env:
          NODE_ENV: "production"

      - name: Deploy to Vercel (preview)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-github-token: ${{ secrets.VERCEL_GITHUB_TOKEN }}

  mobile-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build www-studio frontend
        run: pnpm --filter @workspace/www-studio run build
        env:
          NODE_ENV: "production"

      - name: Install Playwright chromium
        run: pnpm --filter @workspace/www-studio exec playwright install --with-deps chromium

      - name: Run mobile touch-visibility smoke test (390x844)
        run: pnpm --filter @workspace/www-studio run test:e2e
        env:
          BASE: http://localhost:4173
          SCREENSHOT_DIR: artifacts/www-studio/e2e/mobile-shots

      - name: Upload mobile screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-shots
          path: artifacts/www-studio/e2e/mobile-shots/
          retention-days: 7
